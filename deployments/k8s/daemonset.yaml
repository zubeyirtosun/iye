apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: iye
  namespace: iye
  labels:
    app.kubernetes.io/name: iye
    app.kubernetes.io/component: log-squeezer
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: iye
      app.kubernetes.io/component: log-squeezer
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: iye
        app.kubernetes.io/component: log-squeezer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: iye
      hostNetwork: false
      dnsPolicy: ClusterFirst
      terminationGracePeriodSeconds: 30
      priorityClassName: system-node-critical

      containers:
        - name: iye
          image: iye:latest
          imagePullPolicy: IfNotPresent
          args:
            - "-config"
            - "/etc/iye/config.yaml"
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /etc/iye
              readOnly: true
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: buffer
              mountPath: /var/lib/iye/buffer
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: config
          configMap:
            name: iye-config
        - name: varlog
          hostPath:
            path: /var/log
            type: Directory
        - name: buffer
          hostPath:
            path: /var/lib/iye
            type: DirectoryOrCreate
