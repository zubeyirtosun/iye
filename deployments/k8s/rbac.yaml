apiVersion: v1
kind: ServiceAccount
metadata:
  name: iye
  namespace: iye
  labels:
    app.kubernetes.io/name: iye
    app.kubernetes.io/component: log-squeezer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: iye
  labels:
    app.kubernetes.io/name: iye
    app.kubernetes.io/component: log-squeezer
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "nodes/proxy"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: iye
  labels:
    app.kubernetes.io/name: iye
    app.kubernetes.io/component: log-squeezer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: iye
subjects:
  - kind: ServiceAccount
    name: iye
    namespace: iye
